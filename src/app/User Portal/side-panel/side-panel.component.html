<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="(isHandset$ | async) === false">
    <mat-nav-list>
      <!-- <a mat-list-item class="nav-item"
        (mouseenter)="hoveredIndex = 0" 
        (mouseleave)="hoveredIndex = -1"
        routerLink="userData ? '/user/' + userData.uid + '/dashboard' : '/'"
        routerLinkActive="active"
        disableRipple
      >
        <img
        [src]="isRouteActive(item.route) ? 'dashboard_icon_hover.png' : 'dashboard_icon.png'"
        alt="Dashboard Icon"
        class="nav-icon"
        />
        <span>Dashboard</span>
      </a>
      <a mat-list-item href="#">Link 2</a>
      <a mat-list-item href="#">Link 3</a> -->
        <div class="nav-section">
            <div class="flex-grow-1">
                <mat-list-item
                    *ngFor="let item of items"
                    [routerLink]="item.route"
                    routerLinkActive="active"
                    class="nav-item"
                >
                    <img
                        [src]="isRouteActive(item.route) ? item.activeImage : item.defaultImage"
                        alt="List item image"
                        class="nav-icon"
                    />
                    <span>{{ item.name }}</span>
                </mat-list-item>
            </div>
            <mat-list-item (click)="logout()" class="nav-item">
                <img src="logout.png" alt="logout icon" class="logout-icon">
                <span class="logout">Logout</span>
            </mat-list-item>
        </div>
    </mat-nav-list>
    <!-- <div>
        <button (click)="logout()">logout</button>
    </div> -->
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      @if (isHandset$ | async) {
        <button
          type="button"
          aria-label="Toggle sidenav"
          mat-icon-button
          (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      }
      <app-user-header></app-user-header>
      <router-outlet></router-outlet>
    </mat-toolbar>
  </mat-sidenav-content>
</mat-sidenav-container>
